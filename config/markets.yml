defaults:
  event_window_pre: 20
  event_window_post: 20
  car_windows:
    - [-1, 1]
    - [-3, 3]
    - [-5, 5]
  matching:
    lookback_days: 20
    num_controls: 3
    conflict_window_days: 30
    reference_date_column: announce_date
    smd_threshold: 0.25
    sector_filter_mode: penalized
    distance_weights:
      size: 1.0
      pre_event_return: 1.0
      pre_event_volatility: 20.0
      sector_mismatch: 0.5
    directional_penalties:
      larger_mkt_cap: 8.0
      lower_pre_event_volatility: 8.0

markets:
  CN:
    label: China A-shares
    benchmark_name: CSI300
    currency: CNY
  US:
    label: United States
    benchmark_name: S&P500
    currency: USD
