name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (locked)
        run: uv sync --extra dev

      - name: Run Ruff
        run: uv run make lint

      - name: Run mypy
        run: uv run make typecheck

      - name: Run pytest with coverage gate
        run: uv run make coverage-gate

      - name: Run strict project doctor
        run: uv run index-inclusion-doctor --format json --fail-on-warn

      - name: Coverage summary
        if: always()
        run: uv run coverage report --format=total || true
