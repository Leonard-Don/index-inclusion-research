name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run pytest with coverage
        run: pytest -q --cov=index_inclusion_research --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Run project doctor
        run: index-inclusion-doctor --format json

      - name: Coverage summary
        if: always()
        run: python -m coverage report --format=total || true

  dashboard-browser-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run dashboard browser smoke test
        env:
          RUN_BROWSER_SMOKE: "1"
        run: pytest -q -m browser_smoke tests/test_dashboard_browser_smoke.py
