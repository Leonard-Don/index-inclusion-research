name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (locked)
        run: uv sync --extra dev

      - name: Run Ruff
        run: uv run make lint

      - name: Run mypy
        run: uv run make typecheck

      - name: Run pytest with coverage gate
        run: uv run pytest -q --cov=index_inclusion_research --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=70

      - name: Run strict project doctor
        run: uv run index-inclusion-doctor --format json --fail-on-warn

      - name: Coverage summary
        if: always()
        run: uv run coverage report --format=total || true

  dashboard-browser-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies (locked)
        run: uv sync --extra dev

      - name: Install Chromium
        run: uv run playwright install --with-deps chromium

      - name: Run dashboard browser smoke test
        env:
          RUN_BROWSER_SMOKE: "1"
        run: uv run pytest -vv -x --tb=short -m browser_smoke tests/test_dashboard_browser_smoke.py
